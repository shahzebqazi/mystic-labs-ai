# Prometheus: scrape web tier and app metrics (latency, errors).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "web-tier"
    metrics_path: /metrics
    static_configs:
      - targets: ["web-blue:3000", "web-green:3000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+)(:[0-9]+)?"
        replacement: "${1}"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
