# CI: lint and unit tests. DRY — single workflow for PR and push.
name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Orchestration/Tasks/SWE/api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Orchestration/Tasks/SWE/api
      - name: Lint
        run: npm run lint
        working-directory: Orchestration/Tasks/SWE/api

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Orchestration/Tasks/SWE/api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Orchestration/Tasks/SWE/api
      - name: Unit tests
        run: npm test
        working-directory: Orchestration/Tasks/SWE/api

  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose
        run: docker compose -f Orchestration/Tasks/INFRA/docker-compose.yml config --quiet
