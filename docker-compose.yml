# AI Research & Testing Toolkit — Development Environment
# LFM2-inspired stack: efficiency, MoE, edge-compatible tooling

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agi-research:latest
    container_name: agi-research-app
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    profiles:
      - full

