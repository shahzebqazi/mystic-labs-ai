# Load balancer: round-robin between blue/green web tiers.
# Modular: include upstreams from env or override files.
events {
    worker_connections 1024;
}

http {
    # Default: single pool (blue). For Blue-Green, use override to add web-green.
    upstream web {
        least_conn;
        server web-blue:3000 max_fails=2 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://web;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }
    }
}
