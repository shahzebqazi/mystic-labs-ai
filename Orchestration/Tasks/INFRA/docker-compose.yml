# Production-like topology: LB, Web Tier, DB, Redis.
# Modular: override with env or compose overrides for staging.
version: "3.8"

services:
  lb:
    image: nginx:alpine
    ports:
      - "${LB_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-green
      - web-blue
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 2

  web-blue:
    build:
      context: ..
      dockerfile: SWE/api/Dockerfile
    environment:
      - NODE_ENV=production
      - DB_URL=postgresql://app:${DB_PASSWORD:-changeme}@db:5432/app
      - REDIS_URL=redis://redis:6379/0
      - LOG_SERVICE_URL=http://production-logs:3001
      - FEATURE_FLAGS_SOURCE=redis
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-green:
    build:
      context: ..
      dockerfile: SWE/api/Dockerfile
    environment:
      - NODE_ENV=production
      - DB_URL=postgresql://app:${DB_PASSWORD:-changeme}@db:5432/app
      - REDIS_URL=redis://redis:6379/0
      - LOG_SERVICE_URL=http://production-logs:3001
      - FEATURE_FLAGS_SOURCE=redis
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    profiles:
      - blue-green
    deploy:
      replicas: 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../Compliance/init-db-encryption.sql:/docker-entrypoint-initdb.d/01-encryption.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  production-logs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../SWE/api/services/production-logs:/app
    command: ["node", "server.js"]
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 2

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3002}
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3002}:3000"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
