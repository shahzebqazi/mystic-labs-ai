# Build Mockups app and deploy to GitHub Pages
# Required: Settings > Pages > Build and deployment > Source = "GitHub Actions"
# (Not "Deploy from a branch" — this workflow builds and deploys the artifact.)
name: Deploy Mockups to GitHub Pages

on:
  push:
    branches: [main, docs/documentation-reorg]
    paths:
      - 'Mockups/**'
      - '.github/workflows/deploy-mockups-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: Mockups

      - name: Build for GitHub Pages
        run: npm run build
        working-directory: Mockups
        env:
          # Project site URL is https://<user>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Mockups/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
