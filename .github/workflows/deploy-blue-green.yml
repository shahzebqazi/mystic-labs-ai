# Blue-Green deployment: build, test, then switch traffic with minimal downtime.
# Requires: DOCKER_REGISTRY, DEPLOY_TARGET (e.g. staging/prod), and env secrets.
name: Deploy (Blue-Green)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
  push:
    branches: [main]
    paths:
      - "Project/Orchestration/Tasks/SWE/api/**"
      - "Project/Orchestration/Tasks/INFRA/**"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: Project/Orchestration/Tasks/SWE/api
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}:blue-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}:green-${{ github.sha }}
      - id: meta
        run: |
          echo "tags=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}:blue-${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Deploy (Blue-Green placeholder)
        run: |
          echo "Blue-Green deploy: use your orchestrator (K8s, ECS, or compose) to:"
          echo "1. Deploy new stack (green) with image from build job"
          echo "2. Run smoke tests against green"
          echo "3. Switch LB to green"
          echo "4. Drain and remove blue"
          echo "Image: ${{ needs.build.outputs.image }}"
